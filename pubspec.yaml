name: mcqs_generator_ai_app
description: "A Flutter project to generate mcqs using AI"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.5

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  window_manager:
  path_provider: ^2.1.3
  file_picker: ^8.0.5
  url_launcher: ^6.3.0
  csv: ^6.0.0
  shared_preferences: ^2.2.3
  google_generative_ai: ^0.4.6
  scrollable_positioned_list: ^0.3.8
  get: ^4.6.6
  #open_file:

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  msix: ^3.16.8
  flutter_launcher_icons: "^0.13.1"
  flutter_math_fork:

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"
flutter:
  uses-material-design: true

  assets:
    - assets/images/icon.png

msix_config:
  display_name: "MCQs Generator AI App"
  publisher_display_name: "Govt: Boys Degree College Nawabshah"
  identity_name: com.examiter.mcqs-moderator-app
#  msix_version: 1.0.1.0
  logo_path: "assets/images/icon.png"
  languages: en-us
  capabilities: